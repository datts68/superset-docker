apiVersion: v1
kind: Secret
metadata:
  name: superset-secrets
type: Opaque
stringData:
  POSTGRES_USER: superset
  POSTGRES_PASSWORD: GtelicT175
  POSTGRES_DB: superset
  REDIS_PASSWORD: GtelicT175
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: superset-config-ndxp
data:
  superset_config.py: |
    import os

    # --- Security ---
    SECRET_KEY = "GtelICTAgentNode175"

    # --- Database & Redis ---
    SQLALCHEMY_DATABASE_URI = "postgresql://superset:GtelicT175@superset-db-ndxp:5432/superset"
    SQLALCHEMY_EXAMPLES_URI = "postgresql://superset:GtelicT175@superset-db-ndxp:5432/superset"
    REDIS_URL = "redis://:GtelicT175@superset-redis-ndxp:6379/0"

    # --- Celery Configuration ---
    class CeleryConfig:
        broker_url = REDIS_URL
        imports = ("superset.sql_lab", "superset.tasks", "superset.tasks.thumbnails")
        result_backend = REDIS_URL
        worker_prefetch_multiplier = 1
        task_acks_late = True

    CELERY_CONFIG = CeleryConfig

    # --- Theme & UI (Version 6.0.0) ---
    DEFAULT_THEME_CONTROLS = {
        "default_scheme": "light",
        "prefers_color_scheme": False,
    }

    # --- Screenshot & Download Dashboard ---
    WEBDRIVER_TYPE = "chromium"
    WEBDRIVER_EXECUTABLE_PATH = "/usr/bin/chromium"
    WEBDRIVER_BASEURL = "http://superset-app-ndxp:8088/"
    WEBDRIVER_OPTION_ARGS = [
        "--headless",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--disable-gpu",
        "--window-size=1920,1080",
    ]

    # --- Feature Flags ---
    FEATURE_FLAGS = {
        "EMBEDDED_SUPERSET": True,
        "ALERTS_REPORTS": True,
        "ALLOW_DASHBOARD_EXPORT": True,
        "DASHBOARD_RBAC": True,
        # "ENABLE_SUPERSET_META_DB": True, # Nếu muốn kích hoạt Superset Meta Database (kết nối nhiều database)
        # "DARK_MODE_PREFERENCE": False, # Ẩn nút chuyển Dark Mode ở menu người dùng
    }

    # --- Cấu hình BỎ QUA CSRF cho API ---
    WTF_CSRF_ENABLED = True
    WTF_CSRF_CHECK_DEFAULT = False
    WTF_CSRF_EXEMPT_LIST = [
        "superset.views.api.security.guest_token",
        "/api/v1/security/guest_token/",
        "/api/v1/security/guest_token",
        "/api/v1/security/login",
        "/api/v1/security/refresh",
    ]

    # --- Embedding & CORS ---
    ENABLE_CORS = True
    CORS_OPTIONS = {
        "supports_credentials": True,
        "allow_headers": ["*"],
        "origins": ["*"],
        "expose_headers": ["*"],
    }

    HTTP_HEADERS = {"X-Frame-Options": "ALLOWALL"}
    TALISMAN_CONFIG = {
        "content_security_policy": {
            "frame-ancestors": ["*"],
            "style-src": ["'self'", "'unsafe-inline'"],
            "script-src": ["'self'", "'unsafe-inline'", "'unsafe-eval'"],
            "img-src": ["'self'", "data:", "blob:", "*"],
        },
        "force_https": False,
        "session_cookie_secure": False,
        "session_cookie_samesite": None,
    }

    SESSION_COOKIE_SAMESITE = "Lax"
    SESSION_COOKIE_SECURE = False
    SESSION_COOKIE_HTTPONLY = False

    GUEST_ROLE_NAME = "Public"
    GUEST_TOKEN_JWT_EXPIRY_SECONDS = 3600

    # --- Localization ---
    BABEL_DEFAULT_LOCALE = "vi"
    LANGUAGES = {
        "vi": {"flag": "vn", "name": "Vietnamese"},
        "en": {"flag": "us", "name": "English"},
    }

    def get_locale():
        return "vi"

    BABEL_LOCALE_SELECTOR_FUNC = get_locale
    BABEL_DEFAULT_TIMEZONE = "Asia/Ho_Chi_Minh"
    ENABLE_PROXY_FIX = True
